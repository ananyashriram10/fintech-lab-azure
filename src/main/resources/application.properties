# MySQL Connection — Azure env vars override these defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fintech_lab4}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ananya\!2001}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Prevent crash if DB is not immediately reachable
spring.datasource.hikari.initialization-fail-timeout=0

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Server Port
server.port=${PORT:8080}
